name: Digestabot updates

on:
  workflow_call:
    inputs:
      DIGESTABOT_APP_ID:
        required: true
        type: string
    secrets:
      DIGESTABOT_PRIVATE_KEY:
        required: true

jobs:
  digestabot-updates:
    name: Digestabot updates
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push the updates
      pull-requests: write # to open Pull requests
      id-token: write # used to sign the commits using gitsign
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # ratchet:step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - name: Create GitHub app token for Digestabot
        id: digestabot-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # ratchet:actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ inputs.DIGESTABOT_APP_ID }}
          private-key: ${{ secrets.DIGESTABOT_PRIVATE_KEY }}
      - uses: navikt/digestabot@e4b413f1eed3c97f7fd4ffa1d05204de9944d0a9 # ratchet:navikt/digestabot@v1.1.1
        with:
          token: ${{ steps.digestabot-token.outputs.token }}
          team: teamfamilie
          branch-for-pr: 'digestabot'
          commit-message: 'Bump Docker image (digestabot)'
          title-for-pr: 'Bump Docker image (digestabot)'
          description-for-pr: 'Bumper Chainguard Docker image til nyeste tilgjengelige versjon.'
