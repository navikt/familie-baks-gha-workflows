name: Manual deploy
on:
  workflow_call:
    inputs:
      image-name:
        required: false
        type: string
        description: 'Image name, defaults to repo name. Used for environment-specific images'
      image-tag:
        required: true
        type: string
        description: 'Image tag to deploy (example 2025.02.20-18.48-c123d9b)'
      cluster:
        required: true
        type: string
        description: 'The cluster to deploy to (dev-fss|dev-gcp|prod-fss|prod-gcp)'
      resource:
        required: true
        type: string
        description: 'The path to the nais (yaml) resource file to use'
      runs-on:
        required: false
        type: string
        description: 'Which runner image to run the workflow.'
        default: 'ubuntu-latest'

env:
  IMAGE_REGISTRY: europe-north1-docker.pkg.dev/nais-management-233d/teamfamilie
  IMAGE_NAME: ${{ inputs.image-name || github.event.repository.name }}
  IMAGE_TAG: ${{ inputs.image-tag }}

jobs:
  manual-deploy:
    name: Manual deploy
    permissions:
      contents: read
      id-token: write # nais/deploy
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
      - name: Deploy to ${{ inputs.cluster }} from GAR
        uses: navikt/familie-baks-gha-workflows/.github/actions/deploy@main # ratchet:exclude
        with:
          cluster: ${{ inputs.cluster }}
          resource: ${{ inputs.resource }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
